name: Android Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode Keystore
        env:
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          echo "$RELEASE_KEYSTORE" | base64 --decode > app/perletagames.jks

      - name: Decode Google Services
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | tr -d '[:space:]' | base64 --decode > app/google-services.json

      - name: Build Release
        run: ./gradlew assembleRelease bundleRelease
        env:
          ADMOBAPPID: ${{ secrets.ADMOBAPPID }}
          ADMOB_BANNER_ID: ${{ secrets.ADMOB_BANNER_ID }}
          ADMOB_INTERSTITIAL_ID: ${{ secrets.ADMOB_INTERSTITIAL_ID }}
          ADMOB_REWARDED_ID: ${{ secrets.ADMOB_REWARDED_ID }}
          RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/app/perletagames.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
          VERSION_CODE: ${{ github.run_number }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # Sustituye <PROJECT_NUMBER> por el número real de tu proyecto colors-206df
          workload_identity_provider: 'projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/colors-cicd-pool/providers/colors-cicd-provider'
          service_account: 'firebase-adminsdk-fbsvc@colors-206df.iam.gserviceaccount.com'

      - name: Upload to Google Play Internal Testing
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ steps.auth.outputs.credentials_json }}
          packageName: com.alavpa.colors
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v7
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/*.aab
